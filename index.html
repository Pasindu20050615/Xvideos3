<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Tube Stream</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header / Navigation -->
    <header>
        <div class="logo">TubeSite</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Categories</a>
            <a href="#">Trending</a>
        </nav>
    </header>

    <!-- Main Content Grid -->
    <main class="video-grid">
        <!-- Video Card 1 -->
        <div class="video-card">
            <a href="watch.html?id=1">
                <div class="thumbnail">
                    <img src="https://via.placeholder.com/320x180" alt="Video Thumbnail">
                    <span class="duration">10:15</span>
                </div>
                <div class="video-info">
                    <h3>Sample Video Title 1</h3>
                    <p>125K views • 2 days ago</p>
                </div>
            </a>
        </div>

        <!-- Video Card 2 -->
        <div class="video-card">
            <a href="watch.html?id=2">
                <div class="thumbnail">
                    <img src="https://via.placeholder.com/320x180" alt="Video Thumbnail">
                    <span class="duration">14:20</span>
                </div>
                <div class="video-info">
                    <h3>Sample Video Title 2</h3>
                    <p>89K views • 5 hours ago</p>
                </div>
            </a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 TubeSite. All rights reserved. 18+ Only.</p>
    </footer>

</body>
</html>
